<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warehouse Orders</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }

    .badge {
      background: #e63946;
      color: white;
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 13px;
      font-weight: 600;
    }

    .print-history-badge {
      background: #7c3aed;
      color: white;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .refresh-btn {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: #1d4ed8; }
    .refresh-btn:disabled { background: #6b7280; cursor: not-allowed; }

    /* ── Bulk action bar ── */
    .bulk-bar {
      position: sticky;
      top: 57px;
      z-index: 99;
      background: #1e3a5f;
      color: white;
      padding: 10px 20px;
      display: none;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .bulk-bar.visible { display: flex; }
    .bulk-bar span { font-size: 14px; font-weight: 600; flex: 1; }

    .bulk-btn {
      border: none;
      border-radius: 7px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bulk-btn-label   { background: #e2e8f0; color: #1a1a2e; }
    .bulk-btn-invoice { background: #2563eb; color: white; }
    .bulk-btn-packing { background: #059669; color: white; }
    .bulk-btn-all     { background: #e63946; color: white; }
    .bulk-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Select all row ── */
    .select-all-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 4px 4px;
      font-size: 13px;
      color: #6b7280;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
    .select-all-row input[type=checkbox] { width: 17px; height: 17px; cursor: pointer; accent-color: #2563eb; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
      font-size: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 16px; }

    .order-card {
      background: white;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: box-shadow 0.2s, outline 0.15s;
    }
    .order-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .order-card.selected { outline: 2px solid #2563eb; }

    .order-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      user-select: none;
    }

    .order-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* checkbox in header */
    .order-check {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #2563eb;
      flex-shrink: 0;
    }

    .order-number { font-size: 18px; font-weight: 700; color: #1a1a2e; }

    .order-status {
      background: #fef3c7;
      color: #92400e;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .order-date { font-size: 13px; color: #9ca3af; }

    .chevron { font-size: 18px; color: #9ca3af; transition: transform 0.2s; }
    .order-card.open .chevron { transform: rotate(180deg); }

    .order-body { display: none; padding: 16px 20px; }
    .order-card.open .order-body { display: block; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }

    .info-item label {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 4px;
    }
    .info-item span { font-size: 14px; color: #1a1a2e; font-weight: 500; }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .items-table th {
      text-align: left;
      padding: 8px 10px;
      background: #f9fafb;
      color: #6b7280;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      border-bottom: 1px solid #e5e7eb;
    }
    .items-table td {
      padding: 10px 10px;
      border-bottom: 1px solid #f3f4f6;
      color: #374151;
    }
    .items-table tr:last-child td { border-bottom: none; }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
    }
    @media (max-width: 650px) { .action-buttons { grid-template-columns: 1fr 1fr; } }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 12px 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      line-height: 1.2;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-label   { background: #1a1a2e; color: white; }
    .btn-label:hover:not(:disabled)   { background: #2d2d4e; }

    .btn-invoice { background: #2563eb; color: white; }
    .btn-invoice:hover:not(:disabled) { background: #1d4ed8; }

    .btn-packing { background: #059669; color: white; }
    .btn-packing:hover:not(:disabled) { background: #047857; }

    .btn-printall { background: #e63946; color: white; }
    .btn-printall:hover:not(:disabled) { background: #c81d2a; }

    .btn-archive { background: #f3f4f6; color: #6b7280; border: 1px solid #e5e7eb; }
    .btn-archive:hover:not(:disabled) { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }

    .btn-icon { font-size: 20px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1a1a2e;
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 9999;
      transition: transform 0.3s ease;
      max-width: 90vw;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #059669; }
    .toast.error   { background: #dc2626; }
    .toast.info    { background: #2563eb; }

    .total-row {
      display: flex;
      justify-content: flex-end;
      font-weight: 700;
      font-size: 15px;
      color: #1a1a2e;
      padding: 8px 10px 0;
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <h1>📦 Warehouse Orders</h1>
    <span class="badge" id="order-count">0</span>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
</header>

<!-- Bulk action bar (appears when orders are selected) -->
<div class="bulk-bar" id="bulk-bar">
  <span id="bulk-label">0 orders selected</span>
  <button class="bulk-btn bulk-btn-label"   onclick="bulkPrint('label')"   id="bulk-btn-label">🏷️ Print Labels</button>
  <button class="bulk-btn bulk-btn-invoice" onclick="bulkPrint('invoice')" id="bulk-btn-invoice">🖨️ Print Invoices</button>
  <button class="bulk-btn bulk-btn-packing" onclick="bulkPrint('packing')" id="bulk-btn-packing">📋 Print Slips</button>
  <button class="bulk-btn bulk-btn-all"     onclick="bulkPrint('all')"     id="bulk-btn-all">⚡ Print All</button>
</div>

<div class="container">
  <div id="orders-container">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading orders...</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let ordersData = [];
  let selectedIndexes = new Set();
  let printHistory = {};

  // ── Load orders ──────────────────────────────────────────────────────────────
  async function loadOrders() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '↻ Loading...';
    selectedIndexes.clear();
    updateBulkBar();

    document.getElementById('orders-container').innerHTML = `
      <div class="loading"><div class="spinner"></div><p>Loading orders...</p></div>`;

    try {
      const [ordersRes, historyRes] = await Promise.all([
        fetch('/api/orders'),
        fetch('/api/print-history'),
      ]);
      const data = await ordersRes.json();
      const histData = await historyRes.json();
      if (!data.success) throw new Error(data.error);
      ordersData = data.orders;
      printHistory = histData.history || {};
      document.getElementById('order-count').textContent = ordersData.length;
      renderOrders(ordersData);
    } catch (err) {
      document.getElementById('orders-container').innerHTML = `
        <div class="empty"><div class="icon">⚠️</div><p>Failed to load: ${err.message}</p></div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '↻ Refresh';
    }
  }

  // ── Render orders ─────────────────────────────────────────────────────────────
  function renderOrders(orders) {
    const container = document.getElementById('orders-container');

    if (orders.length === 0) {
      container.innerHTML = `
        <div class="empty"><div class="icon">✅</div><p>No unfulfilled orders. All caught up!</p></div>`;
      return;
    }

    const selectAllRow = `
      <div class="select-all-row" onclick="toggleSelectAll()">
        <input type="checkbox" id="select-all-cb" onclick="event.stopPropagation(); toggleSelectAll()" />
        <span>Select All</span>
      </div>`;

    const cards = orders.map((order, idx) => {
      const date = new Date(order.createdAt).toLocaleDateString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });

      const itemsRows = order.items.map(item => `
        <tr>
          <td>${item.title}${item.variant ? ' — ' + item.variant : ''}</td>
          <td>${item.sku || '—'}</td>
          <td style="text-align:center;font-weight:700;">${item.quantity}</td>
        </tr>
      `).join('');

      // Print history badge
      const hist = printHistory[order.name];
      const totalPrints = hist ? (hist.label || 0) + (hist.invoice || 0) + (hist.packing || 0) : 0;
      const printBadge = totalPrints > 0
        ? `<span class="print-history-badge" title="Label:${hist.label||0} Invoice:${hist.invoice||0} Slip:${hist.packing||0}">🖨️ ${totalPrints}x</span>`
        : '';

      return `
        <div class="order-card" id="card-${idx}">
          <div class="order-header" onclick="toggleCard(${idx})">
            <div class="order-header-left">
              <input type="checkbox" class="order-check" id="check-${idx}"
                onclick="event.stopPropagation(); toggleSelect(${idx})" />
              <span class="order-number">${order.name}</span>
              <span class="order-status">${order.status}</span>
              ${printBadge}
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <span class="order-date">${date}</span>
              <span class="chevron">▼</span>
            </div>
          </div>
          <div class="order-body">
            <div class="info-grid">
              <div class="info-item">
                <label>Customer</label>
                <span>${order.customerName || '—'}</span>
              </div>
              <div class="info-item">
                <label>Phone</label>
                <span>${order.phone || '—'}</span>
              </div>
              <div class="info-item" style="grid-column:1/-1;">
                <label>Shipping Address</label>
                <span>${order.address || '—'}</span>
              </div>
            </div>

            <table class="items-table">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>SKU</th>
                  <th style="text-align:center;">Qty</th>
                </tr>
              </thead>
              <tbody>${itemsRows}</tbody>
            </table>
            <div class="total-row">Total: ${order.total}</div>

            <div class="action-buttons">
              <button class="btn btn-label"    onclick="printLabel(${idx})"       id="btn-label-${idx}">
                <span class="btn-icon">🏷️</span>Print Label
              </button>
              <button class="btn btn-invoice"  onclick="printInvoice(${idx})"     id="btn-invoice-${idx}">
                <span class="btn-icon">🖨️</span>Print Invoice
              </button>
              <button class="btn btn-packing"  onclick="printPackingSlip(${idx})" id="btn-packing-${idx}">
                <span class="btn-icon">📋</span>Packing Slip
              </button>
              <button class="btn btn-printall" onclick="printAll(${idx})"         id="btn-printall-${idx}">
                <span class="btn-icon">⚡</span>Print All
              </button>
              <button class="btn btn-archive"  onclick="archiveOrder(${idx})"     id="btn-archive-${idx}">
                <span class="btn-icon">📁</span>Archive
              </button>
            </div>
          </div>
        </div>`;
    }).join('');

    container.innerHTML = selectAllRow + cards;
  }

  // ── Toggle card open/close ────────────────────────────────────────────────────
  function toggleCard(idx) {
    document.getElementById(`card-${idx}`).classList.toggle('open');
  }

  // ── Selection logic ───────────────────────────────────────────────────────────
  function toggleSelect(idx) {
    if (selectedIndexes.has(idx)) {
      selectedIndexes.delete(idx);
      document.getElementById(`card-${idx}`).classList.remove('selected');
    } else {
      selectedIndexes.add(idx);
      document.getElementById(`card-${idx}`).classList.add('selected');
    }
    updateBulkBar();
    updateSelectAllCheckbox();
  }

  function toggleSelectAll() {
    const allSelected = selectedIndexes.size === ordersData.length;
    selectedIndexes.clear();
    ordersData.forEach((_, idx) => {
      const cb = document.getElementById(`check-${idx}`);
      const card = document.getElementById(`card-${idx}`);
      if (!allSelected) {
        selectedIndexes.add(idx);
        if (cb) cb.checked = true;
        if (card) card.classList.add('selected');
      } else {
        if (cb) cb.checked = false;
        if (card) card.classList.remove('selected');
      }
    });
    const saCb = document.getElementById('select-all-cb');
    if (saCb) saCb.checked = !allSelected;
    updateBulkBar();
  }

  function updateSelectAllCheckbox() {
    const saCb = document.getElementById('select-all-cb');
    if (!saCb) return;
    saCb.checked = selectedIndexes.size === ordersData.length && ordersData.length > 0;
    saCb.indeterminate = selectedIndexes.size > 0 && selectedIndexes.size < ordersData.length;
  }

  function updateBulkBar() {
    const bar = document.getElementById('bulk-bar');
    const label = document.getElementById('bulk-label');
    const n = selectedIndexes.size;
    if (n > 0) {
      bar.classList.add('visible');
      label.textContent = `${n} order${n > 1 ? 's' : ''} selected`;
    } else {
      bar.classList.remove('visible');
    }
  }

  // ── Print All for a single order ──────────────────────────────────────────────
  async function printAll(idx) {
    const btn = document.getElementById(`btn-printall-${idx}`);
    const originalHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-icon">⏳</span>Printing...';
    showToast('⚡ Printing label, invoice & packing slip...', 'info');
    try {
      await Promise.all([
        doPrintLabel(idx),
        doPrintInvoice(idx),
        doPrintPackingSlip(idx),
      ]);
      showToast('✅ All 3 printed for ' + ordersData[idx].name + '!', 'success');
    } catch (err) {
      showToast('❌ ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = originalHTML;
    }
  }

  // ── Bulk print ────────────────────────────────────────────────────────────────
  async function bulkPrint(type) {
    const indexes = [...selectedIndexes].sort((a, b) => a - b);
    if (indexes.length === 0) return;

    const btns = ['bulk-btn-label','bulk-btn-invoice','bulk-btn-packing','bulk-btn-all'];
    btns.forEach(id => { const b = document.getElementById(id); if(b) b.disabled = true; });

    showToast(`⏳ Printing ${type === 'all' ? 'everything' : type} for ${indexes.length} orders...`, 'info');

    let done = 0;
    for (const idx of indexes) {
      try {
        if (type === 'label')   await doPrintLabel(idx);
        if (type === 'invoice') await doPrintInvoice(idx);
        if (type === 'packing') await doPrintPackingSlip(idx);
        if (type === 'all') {
          await doPrintLabel(idx);
          await doPrintInvoice(idx);
          await doPrintPackingSlip(idx);
        }
        done++;
        showToast(`⏳ ${done}/${indexes.length} done...`, 'info');
      } catch (err) {
        showToast(`❌ ${ordersData[idx].name}: ${err.message}`, 'error');
        await new Promise(r => setTimeout(r, 1500));
      }
    }

    btns.forEach(id => { const b = document.getElementById(id); if(b) b.disabled = false; });
    showToast(`✅ Done! Printed ${done}/${indexes.length} orders.`, 'success');
  }

  // ── Core print helpers (no UI state) ─────────────────────────────────────────
  async function doPrintLabel(idx) {
    const order = ordersData[idx];
    const res = await fetch('/api/print/label', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderName: order.name, customerName: order.customerName, address: order.address, phone: order.phone }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
  }

  async function doPrintInvoice(idx) {
    const order = ordersData[idx];
    const res = await fetch('/api/print/invoice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderName: order.name }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
  }

  async function doPrintPackingSlip(idx) {
    const order = ordersData[idx];
    const res = await fetch('/api/print/packing-slip', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        shopifyId: order.shopifyId, orderName: order.name, customerName: order.customerName,
        address: order.address, phone: order.phone, items: order.items, total: order.total,
      }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
  }

  // ── Individual print buttons ──────────────────────────────────────────────────
  async function printLabel(idx) {
    const btn = document.getElementById(`btn-label-${idx}`);
    await doAction(btn, async () => {
      await doPrintLabel(idx);
      showToast('✅ Label sent to Zebra printer!', 'success');
    });
  }

  async function printInvoice(idx) {
    const btn = document.getElementById(`btn-invoice-${idx}`);
    await doAction(btn, async () => {
      await doPrintInvoice(idx);
      showToast('✅ Invoice sent to HP printer!', 'success');
    });
  }

  async function printPackingSlip(idx) {
    const btn = document.getElementById(`btn-packing-${idx}`);
    await doAction(btn, async () => {
      await doPrintPackingSlip(idx);
      showToast('✅ Packing slip sent to HP printer!', 'success');
    });
  }

  async function archiveOrder(idx) {
    const order = ordersData[idx];
    if (!confirm(`Archive order ${order.name}? This will close it in Shopify.`)) return;
    const btn = document.getElementById(`btn-archive-${idx}`);
    await doAction(btn, async () => {
      const res = await fetch('/api/orders/archive', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ shopifyId: order.shopifyId }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      showToast(`📁 Order ${order.name} archived!`, 'success');
      selectedIndexes.delete(idx);
      updateBulkBar();
      const card = document.getElementById(`card-${idx}`);
      card.style.opacity = '0';
      card.style.transition = 'opacity 0.4s';
      setTimeout(() => {
        ordersData.splice(idx, 1);
        document.getElementById('order-count').textContent = ordersData.length;
        renderOrders(ordersData);
      }, 400);
    });
  }

  // ── Generic action wrapper ────────────────────────────────────────────────────
  async function doAction(btn, fn) {
    const originalHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-icon">⏳</span>Sending...';
    try { await fn(); }
    catch (err) { showToast('❌ ' + err.message, 'error'); }
    finally { btn.disabled = false; btn.innerHTML = originalHTML; }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────────
  function showToast(msg, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show ' + type;
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.className = 'toast'; }, 3500);
  }

  // ── Init ──────────────────────────────────────────────────────────────────────
  loadOrders();
  setInterval(loadOrders, 60000);
</script>
</body>
</html>
