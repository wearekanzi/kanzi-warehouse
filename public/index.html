<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Kanzi Warehouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --off-white: #F5F4F0;
      --gray-50: #fafafa;
      --gray-100: #f4f4f4;
      --gray-200: #e8e8e8;
      --gray-300: #d0d0d0;
      --gray-400: #a0a0a0;
      --gray-500: #707070;
      --gray-600: #505050;
      --gray-700: #303030;
      --radius: 12px;
      --radius-sm: 7px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 14px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 24px rgba(0,0,0,0.13);
      /* Status colors — kept subtle */
      --green: #1a7a4a;
      --green-bg: #edf7f2;
      --red: #c0392b;
      --red-bg: #fdf0ee;
      --amber: #b7860b;
      --amber-bg: #fdf8ec;
      --blue: #1a4fa0;
      --blue-bg: #edf2fc;
    }

    body {
      font-family: 'Montserrat', -apple-system, sans-serif;
      background: var(--off-white);
      color: var(--black);
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── HEADER ── */
    header {
      background: var(--black);
      color: var(--white);
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-logo img { width: 28px; height: 28px; object-fit: contain; filter: invert(1); }
    .header-title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--white);
    }
    .header-subtitle {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-top: 1px;
    }

    .refresh-btn {
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }
    .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── NAV TABS ── */
    .nav-tabs {
      background: var(--black);
      display: flex;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .nav-tab {
      background: none;
      border: none;
      color: var(--gray-400);
      padding: 13px 18px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--white); }
    .nav-tab.active { color: var(--white); border-bottom-color: var(--white); }

    .tab-badge {
      background: var(--red);
      color: white;
      border-radius: 10px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 800;
      min-width: 20px;
      text-align: center;
      letter-spacing: 0;
    }
    .tab-badge.green { background: var(--green); }

    /* ── BULK BAR ── */
    .bulk-bar {
      position: sticky;
      top: 58px;
      z-index: 190;
      background: var(--black);
      color: white;
      padding: 8px 16px;
      display: none;
      flex-direction: column;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .bulk-bar.visible { display: flex; }
    .bulk-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .bulk-bar-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; flex: 1; }
    .bulk-btn {
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 7px 13px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.2s;
      background: transparent;
      color: white;
    }
    .bulk-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .bulk-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
    .bulk-btn-all { background: white; color: black; border-color: white; }
    .bulk-btn-all:hover:not(:disabled) { background: var(--gray-200); }

    /* ── CONTAINER ── */
    .page-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ── SECTION VISIBILITY ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── LOADING / EMPTY ── */
    .loading-state, .empty-state {
      text-align: center;
      padding: 70px 20px;
      color: var(--gray-400);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--gray-200);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p, .loading-state p { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }

    /* ── SELECT ALL ROW ── */
    .select-all-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 4px 12px;
      font-size: 11px;
      color: var(--gray-500);
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }
    .select-all-row input[type=checkbox] {
      width: 16px; height: 16px;
      cursor: pointer;
      accent-color: var(--black);
    }

    /* ── ORDER CARD ── */
    .order-card {
      background: var(--white);
      border-radius: var(--radius);
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: box-shadow 0.2s, outline 0.15s;
      border: 1.5px solid transparent;
    }
    .order-card:hover { box-shadow: var(--shadow-lg); }
    .order-card.selected { border-color: var(--black); }

    .order-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      gap: 10px;
    }
    .order-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .order-check {
      width: 16px; height: 16px;
      cursor: pointer;
      accent-color: var(--black);
      flex-shrink: 0;
    }
    .order-number {
      font-size: 16px;
      font-weight: 800;
      color: var(--black);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .order-type-pill {
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .type-order    { background: var(--gray-100); color: var(--gray-600); border: 1px solid var(--gray-200); }
    .type-exchange { background: var(--amber-bg); color: var(--amber); border: 1px solid #f0d080; }
    .type-return   { background: var(--red-bg); color: var(--red); border: 1px solid #e8b0aa; }
    .type-unfulfilled { background: var(--gray-100); color: var(--gray-500); border: 1px solid var(--gray-200); }

    .print-badge {
      background: var(--gray-100);
      color: var(--gray-500);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      border: 1px solid var(--gray-200);
    }

    /* ── ACTIVITY STRIP ── */
    .activity-strip {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 8px 18px;
      background: var(--gray-50);
      border-top: 1px solid var(--gray-100);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .activity-strip::-webkit-scrollbar { display: none; }
    .activity-step {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .activity-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .activity-pill.done {
      background: #e8f5e9;
      color: #1a7a4a;
      border: 1px solid #b2dfdb;
    }
    .activity-pill.pending {
      background: var(--gray-100);
      color: var(--gray-400);
      border: 1px solid var(--gray-200);
    }
    .activity-pill.done .apill-icon { opacity: 1; }
    .activity-pill.pending .apill-icon { opacity: 0.4; }
    .activity-connector {
      width: 14px;
      height: 1px;
      background: var(--gray-200);
      flex-shrink: 0;
      margin: 0 1px;
    }
    .activity-connector.done { background: #b2dfdb; }

    .order-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .order-date { font-size: 11px; color: var(--gray-400); font-weight: 600; letter-spacing: 0.3px; }
    .chevron { font-size: 11px; color: var(--gray-300); transition: transform 0.2s; }
    .order-card.open .chevron { transform: rotate(180deg); }

    .order-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--gray-100); }
    .order-card.open .order-body { display: block; }

    /* ── INFO GRID ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 14px 0 12px;
    }
    @media (max-width: 500px) { .info-grid { grid-template-columns: 1fr; } }
    .info-item label {
      font-size: 9px;
      font-weight: 800;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 3px;
    }
    .info-item span { font-size: 13px; color: var(--black); font-weight: 600; }

    /* ── ITEMS TABLE ── */
    .items-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .items-table th {
      text-align: left;
      padding: 8px 10px;
      background: var(--gray-50);
      color: var(--gray-400);
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid var(--gray-200);
    }
    .items-table td {
      padding: 10px;
      border-bottom: 1px solid var(--gray-100);
      color: var(--gray-700);
      font-weight: 500;
    }
    .items-table tr:last-child td { border-bottom: none; }
    .items-table .qty-cell {
      text-align: center;
      font-weight: 800;
      color: var(--black);
    }

    .total-row {
      text-align: right;
      font-weight: 800;
      font-size: 13px;
      color: var(--black);
      padding: 10px 10px 14px;
      letter-spacing: 0.3px;
    }

    /* ── ACTION BUTTONS ── */
    .action-buttons {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 7px;
    }
    @media (max-width: 600px) { .action-buttons { grid-template-columns: 1fr 1fr; } }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 11px 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      line-height: 1.2;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.96); }
    .btn-icon { font-size: 18px; }

    .btn-label    { background: var(--black); color: var(--white); }
    .btn-label:hover:not(:disabled)    { background: var(--gray-700); }
    .btn-invoice  { background: var(--gray-700); color: var(--white); }
    .btn-invoice:hover:not(:disabled)  { background: var(--gray-600); }
    .btn-packing  { background: var(--gray-500); color: var(--white); }
    .btn-packing:hover:not(:disabled)  { background: var(--gray-600); }
    .btn-printall { background: var(--black); color: var(--white); border: 2px solid var(--black); }
    .btn-printall:hover:not(:disabled) { background: var(--gray-700); }
    .btn-archive  { background: var(--gray-100); color: var(--gray-500); border: 1px solid var(--gray-200); }
    .btn-archive:hover:not(:disabled)  { background: var(--red-bg); color: var(--red); border-color: #e8b0aa; }
    .btn-driver   { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .btn-driver:hover:not(:disabled)   { background: #c8e6c9; }
    .btn-driver.assigned { background: #2e7d32; color: #fff; border-color: #2e7d32; cursor: default; }

    /* ── DELIVERY TAB — OWNER OVERVIEW ── */

    /* Stats row */
    .dv-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }
    .dv-stat {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 12px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
    }
    .dv-stat::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .dv-stat.s-pending::before  { background: var(--amber); }
    .dv-stat.s-picked_up::before { background: var(--blue); }
    .dv-stat.s-delivered::before { background: var(--green); }
    .dv-stat.s-noanswer::before  { background: var(--red); }
    .dv-stat.active { box-shadow: 0 2px 12px rgba(0,0,0,0.12); transform: translateY(-1px); }
    .dv-stat.active.s-pending  { border-color: var(--amber); }
    .dv-stat.active.s-picked_up { border-color: var(--blue); }
    .dv-stat.active.s-delivered { border-color: var(--green); }
    .dv-stat.active.s-noanswer  { border-color: var(--red); }
    .dv-stat-num {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }
    .s-pending  .dv-stat-num { color: var(--amber); }
    .s-picked_up .dv-stat-num { color: var(--blue); }
    .s-delivered .dv-stat-num { color: var(--green); }
    .s-noanswer  .dv-stat-num { color: var(--red); }
    .dv-stat-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--gray-400);
    }

    /* All filter pill — separate */
    .dv-all-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.2s;
      color: var(--gray-500);
      margin-bottom: 16px;
    }
    .dv-all-pill.active { background: var(--black); border-color: var(--black); color: var(--white); }
    .dv-all-pill-count {
      background: var(--gray-200);
      color: var(--gray-600);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 800;
    }
    .dv-all-pill.active .dv-all-pill-count { background: rgba(255,255,255,0.2); color: var(--white); }

    /* Financial summary bar */
    .dv-money-bar {
      background: var(--black);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      gap: 0;
      margin-bottom: 18px;
      overflow: hidden;
    }
    .dv-money-item {
      flex: 1;
      text-align: center;
      position: relative;
    }
    .dv-money-item + .dv-money-item::before {
      content: '';
      position: absolute;
      left: 0; top: 10%; bottom: 10%;
      width: 1px;
      background: rgba(255,255,255,0.12);
    }
    .dv-money-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 5px;
    }
    .dv-money-value {
      font-size: 16px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: -0.3px;
    }
    .dv-money-value.collect { color: #5fd49a; }
    .dv-money-value.refund  { color: #f0857a; }

    /* Section heading */
    .dv-section-heading {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--gray-200);
    }

    /* ── DELIVERY CARDS (matches driver portal exactly) ── */
    .delivery-card {
      background: #ffffff;
      border-radius: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.06);
      border: 1px solid #ebebeb;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .delivery-card.status-pending   { border-left: 4px solid #b06000; }
    .delivery-card.status-picked_up { border-left: 4px solid #1a4fa0; }
    .delivery-card.status-delivered { border-left: 4px solid #0a7a45; opacity: 0.78; }
    .delivery-card.status-no_answer { border-left: 4px solid #c0392b; }

    /* Card header */
    .dc-top { padding: 14px 16px 0; }
    .dc-row1 { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
    .dc-left { display: flex; flex-direction: column; gap: 5px; }
    .dc-order-name { font-size: 22px; font-weight: 900; color: #0a0a0a; letter-spacing: -0.3px; line-height: 1; }
    .dc-meta { display: flex; align-items: center; gap: 6px; }

    /* Type pills */
    .type-pill {
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .type-order    { background: #f5f5f5; color: #505050; border: 1px solid #ebebeb; }
    .type-exchange { background: #fdf5e6; color: #b06000; border: 1px solid #f0c878; }
    .type-return   { background: #fdf0ee; color: #c0392b; border: 1px solid #e8b0aa; }

    /* Status dot + label */
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-pending   { background: #b06000; }
    .dot-picked_up { background: #1a4fa0; }
    .dot-delivered { background: #0a7a45; }
    .dot-no_answer { background: #c0392b; }
    .status-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .sl-pending   { color: #b06000; }
    .sl-picked_up { color: #1a4fa0; }
    .sl-delivered { color: #0a7a45; }
    .sl-no_answer { color: #c0392b; }

    /* Amount banner */
    .dc-amount-banner {
      margin: 12px 16px 0;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dc-amount-banner.collect { background: #e6f5ee; border: 1px solid #b3dfc9; }
    .dc-amount-banner.refund  { background: #fdf0ee; border: 1px solid #e8b0aa; }
    .dc-ab-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
    .collect .dc-ab-label { color: #0a7a45; }
    .refund  .dc-ab-label { color: #c0392b; }
    .dc-ab-value { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
    .collect .dc-ab-value { color: #0a7a45; }
    .refund  .dc-ab-value { color: #c0392b; }
    .dc-ab-icon { font-size: 22px; }

    /* Card body */
    .dc-body { padding: 12px 16px 14px; }
    .dc-customer { font-size: 15px; font-weight: 800; color: #0a0a0a; margin-bottom: 8px; }
    .dc-info-line { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: #787878; font-weight: 500; margin-bottom: 5px; line-height: 1.5; }
    .dc-info-line .ic { flex-shrink: 0; font-size: 13px; margin-top: 1px; }

    /* Contact row */
    .dc-contact-row { display: flex; gap: 8px; margin-top: 12px; }
    .dc-contact-btn {
      flex: 1; border: none; border-radius: 10px; padding: 11px 8px;
      font-size: 12px; font-weight: 700; letter-spacing: 0.2px;
      cursor: pointer; font-family: 'Montserrat', sans-serif;
      transition: all 0.15s; display: flex; align-items: center;
      justify-content: center; gap: 5px; text-decoration: none;
    }
    .dc-contact-btn:active { transform: scale(0.95); }
    .dc-btn-call { background: #f5f5f5; color: #0a0a0a; border: 1px solid #ebebeb; }
    .dc-btn-wa   { background: #25d366; color: white; }

    /* Card divider */
    .dc-divider { height: 1px; background: #ebebeb; margin: 0 16px; }

    /* Owner override actions */
    .dc-actions {
      padding: 12px 16px 14px;
    }
    .dc-actions-label {
      font-size: 9px; font-weight: 800; letter-spacing: 1.2px;
      text-transform: uppercase; color: #b0b0b0;
      margin-bottom: 8px;
    }
    .dc-override-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .da-btn {
      border-radius: 8px; padding: 8px 12px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
      cursor: pointer; font-family: 'Montserrat', sans-serif;
      transition: all 0.15s; display: flex; align-items: center; gap: 4px;
      border: 1px solid #ebebeb; background: #f5f5f5; color: #505050;
    }
    .da-btn:active { transform: scale(0.95); }
    .da-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .da-pickup    { background: #0a0a0a; color: white; border-color: #0a0a0a; }
    .da-delivered { background: #0a7a45; color: white; border-color: #0a7a45; }
    .da-noanswer  { background: #fdf5e6; color: #b06000; border-color: #f0c878; }
    .da-reset     { background: #f5f5f5; color: #505050; border-color: #ebebeb; }
    .da-unassign  { background: #fdf0ee; color: #c0392b; border-color: #e8b0aa; }
    .da-returned  { background: #0a7a45; color: white; border-color: #0a7a45; width: 100%; justify-content: center; padding: 13px; font-size: 13px; border-radius: 10px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--black);
      color: var(--white);
      padding: 12px 22px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
      z-index: 9999;
      transition: transform 0.3s ease;
      max-width: 90vw;
      text-align: center;
      box-shadow: var(--shadow-lg);
      font-family: 'Montserrat', sans-serif;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error   { background: var(--red); }
    .toast.info    { background: var(--gray-700); }

    /* ── DIVIDER ── */
    .section-label {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--gray-200);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-brand">
    <div class="header-logo">
      <img src="/kanzi-icon.png" alt="Kanzi" />
    </div>
    <div>
      <div class="header-title">Kanzi</div>
      <div class="header-subtitle">Warehouse</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div id="printer-status" title="Printer connection status" style="display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:1px;color:#aaa;cursor:default;">
      <span id="printer-dot" style="width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;"></span>
      <span id="printer-label">PRINTERS</span>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="refreshCurrent()">↻ Refresh</button>
  </div>
</header>

<!-- NAV TABS -->
<div class="nav-tabs">
  <button class="nav-tab active" id="tab-warehouse" onclick="switchTab('warehouse')">
    Warehouse <span class="tab-badge" id="order-count">0</span>
  </button>
  <button class="nav-tab" id="tab-delivery" onclick="switchTab('delivery')">
    Delivery <span class="tab-badge green" id="delivery-count">0</span>
  </button>
</div>

<!-- BULK BAR -->
<div class="bulk-bar" id="bulk-bar">
  <div class="bulk-bar-row">
    <span class="bulk-bar-label" id="bulk-label">0 selected</span>
    <button class="bulk-btn bulk-btn-label"    onclick="bulkPrint('label')"   id="bulk-btn-label">Labels</button>
    <button class="bulk-btn bulk-btn-invoice"  onclick="bulkPrint('invoice')" id="bulk-btn-invoice">Invoices</button>
    <button class="bulk-btn bulk-btn-packing"  onclick="bulkPrint('packing')" id="bulk-btn-packing">Slips</button>
    <button class="bulk-btn bulk-btn-all"      onclick="bulkPrint('all')"     id="bulk-btn-all">Print All</button>
  </div>
  <div class="bulk-bar-row">
    <span style="font-size:10px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;">Driver</span>
    <button class="bulk-btn bulk-btn-driver"   onclick="bulkAssignDriver()"   id="bulk-btn-driver" style="background:#2e7d32;border-color:#2e7d32;">🚗 Assign Driver</button>
    <button class="bulk-btn bulk-btn-unassign" onclick="bulkUnassignDriver()" id="bulk-btn-unassign" style="background:#c0392b;border-color:#c0392b;">✕ Unassign Driver</button>
    <span style="font-size:10px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-left:8px;">Packing</span>
    <button class="bulk-btn" onclick="bulkAssignFulfillment()"   id="bulk-btn-fulfillment" style="background:#7b3fa0;border-color:#7b3fa0;">📦 Assign Pack</button>
    <button class="bulk-btn" onclick="bulkUnassignFulfillment()" id="bulk-btn-unpack"       style="background:#8b4513;border-color:#8b4513;">✕ Unassign Pack</button>
  </div>
</div>

<!-- WAREHOUSE SECTION -->
<div class="page-container section active" id="warehouse-section">
  <div id="orders-container">
    <div class="loading-state"><div class="spinner"></div><p>Loading orders...</p></div>
  </div>
</div>

<!-- DELIVERY SECTION -->
<div class="page-container section" id="delivery-section">

  <!-- Stats grid (tap to filter) -->
  <div class="dv-stats">
    <div class="dv-stat s-pending" id="dstat-pending" onclick="setDeliveryFilter('pending')">
      <div class="dv-stat-num" id="dnum-pending">0</div>
      <div class="dv-stat-label">Pending</div>
    </div>
    <div class="dv-stat s-picked_up" id="dstat-picked_up" onclick="setDeliveryFilter('picked_up')">
      <div class="dv-stat-num" id="dnum-picked_up">0</div>
      <div class="dv-stat-label">Picked Up</div>
    </div>
    <div class="dv-stat s-delivered" id="dstat-delivered" onclick="setDeliveryFilter('delivered')">
      <div class="dv-stat-num" id="dnum-delivered">0</div>
      <div class="dv-stat-label">Delivered</div>
    </div>
    <div class="dv-stat s-noanswer" id="dstat-no_answer" onclick="setDeliveryFilter('no_answer')">
      <div class="dv-stat-num" id="dnum-no_answer">0</div>
      <div class="dv-stat-label">No Answer</div>
    </div>
  </div>

  <!-- Financial summary -->
  <div class="dv-money-bar" id="dv-money-bar">
    <div class="dv-money-item">
      <div class="dv-money-label">To Collect</div>
      <div class="dv-money-value collect" id="dv-collect">0.000 KWD</div>
    </div>
    <div class="dv-money-item">
      <div class="dv-money-label">To Return</div>
      <div class="dv-money-value refund" id="dv-refund">0.000 KWD</div>
    </div>
    <div class="dv-money-item">
      <div class="dv-money-label">Net Today</div>
      <div class="dv-money-value" id="dv-net">0.000 KWD</div>
    </div>
  </div>

  <!-- All pill -->
  <button class="dv-all-pill active" id="dstat-all" onclick="setDeliveryFilter('all')">
    All orders <span class="dv-all-pill-count" id="dnum-all">0</span>
  </button>

  <div id="delivery-container">
    <div class="loading-state"><div class="spinner"></div><p>Loading deliveries...</p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let ordersData = [];
  let selectedIndexes = new Set();
  let printHistory = {};
  let deliveriesData = [];
  let deliveryFilter = 'all';
  let currentTab = 'warehouse';

  // ── Tab switching ─────────────────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-warehouse').classList.toggle('active', tab === 'warehouse');
    document.getElementById('tab-delivery').classList.toggle('active', tab === 'delivery');
    document.getElementById('warehouse-section').classList.toggle('active', tab === 'warehouse');
    document.getElementById('delivery-section').classList.toggle('active', tab === 'delivery');
    const bulkBar = document.getElementById('bulk-bar');
    if (tab !== 'warehouse') { bulkBar.classList.remove('visible'); }
    if (tab === 'delivery') loadDeliveries();
  }

  function refreshCurrent() {
    if (currentTab === 'warehouse') loadOrders();
    else loadDeliveries();
  }

  // ── Load deliveries ───────────────────────────────────────────────────────────
  async function loadDeliveries() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '↻ Loading...';
    document.getElementById('delivery-container').innerHTML =
      '<div class="loading-state"><div class="spinner"></div><p>Loading deliveries...</p></div>';
    try {
      const res = await fetch('/api/deliveries');
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      deliveriesData = data.deliveries || [];
      const pending = deliveriesData.filter(d => d.status === 'pending' || d.status === 'picked_up').length;
      document.getElementById('delivery-count').textContent = pending;
      updateDeliveryStats();
      renderDeliveries();
    } catch (err) {
      document.getElementById('delivery-container').innerHTML =
        `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load: ${err.message}</p></div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '↻ Refresh';
    }
  }

  function setDeliveryFilter(f) {
    deliveryFilter = f;
    // Update stat cards
    ['pending','picked_up','delivered','no_answer'].forEach(id => {
      const el = document.getElementById('dstat-' + id);
      if (el) el.classList.toggle('active', id === f);
    });
    // Update all pill
    const allPill = document.getElementById('dstat-all');
    if (allPill) allPill.classList.toggle('active', f === 'all');
    renderDeliveries();
  }

  function updateDeliveryStats() {
    const statuses = ['pending','picked_up','delivered','no_answer'];
    statuses.forEach(s => {
      const count = deliveriesData.filter(d => d.status === s).length;
      const el = document.getElementById('dnum-' + s);
      if (el) el.textContent = count;
    });
    const allEl = document.getElementById('dnum-all');
    if (allEl) allEl.textContent = deliveriesData.length;

    // Financial summary — only pending + picked_up (active)
    const active = deliveriesData.filter(d => d.status === 'pending' || d.status === 'picked_up');
    let totalCollect = 0, totalRefund = 0;
    active.forEach(d => {
      const amt = parseFloat(d.amount) || 0;
      if (d.amount_type === 'collect') totalCollect += amt;
      else if (d.amount_type === 'refund') totalRefund += amt;
    });
    const net = totalCollect - totalRefund;
    const fmt = v => Math.abs(v).toFixed(3) + ' KWD';
    const collectEl = document.getElementById('dv-collect');
    const refundEl  = document.getElementById('dv-refund');
    const netEl     = document.getElementById('dv-net');
    if (collectEl) collectEl.textContent = fmt(totalCollect);
    if (refundEl)  refundEl.textContent  = fmt(totalRefund);
    if (netEl) {
      netEl.textContent = (net < 0 ? '-' : '') + fmt(net);
      netEl.style.color = net < 0 ? 'var(--red)' : '#5fd49a';
    }
  }

  function renderDeliveries() {
    const container = document.getElementById('delivery-container');
    const filtered = deliveryFilter === 'all'
      ? deliveriesData
      : deliveriesData.filter(d => d.status === deliveryFilter);

    if (filtered.length === 0) {
      const msgs = {
        all: { icon: '📭', text: 'No deliveries assigned yet.' },
        pending: { icon: '⏳', text: 'No pending deliveries.' },
        picked_up: { icon: '🚗', text: 'Nothing picked up yet.' },
        delivered: { icon: '✅', text: 'No completed deliveries.' },
        no_answer: { icon: '📵', text: 'No unanswered deliveries.' },
      };
      const m = msgs[deliveryFilter] || msgs.all;
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">${m.icon}</div><p>${m.text}</p></div>`;
      return;
    }

    // Sort: pending, picked_up, no_answer, delivered
    const order = { pending: 0, picked_up: 1, no_answer: 2, delivered: 3 };
    const sorted = [...filtered].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));

    container.innerHTML = sorted.map(d => {
      const typeClass = d.order_type === 'EXCHANGE' ? 'type-exchange'
                      : d.order_type === 'RETURN'   ? 'type-return'
                      : 'type-order';
      const statusLabel = { pending: 'Pending', picked_up: 'Picked Up', delivered: 'Delivered', no_answer: 'No Answer' }[d.status] || d.status;
      const amountIsRefund = d.amount_type === 'refund';
      const hasAmount = d.amount && parseFloat(d.amount) > 0 && d.amount_type;
      const amountBanner = hasAmount ? `
        <div class="dc-amount-banner ${amountIsRefund ? 'refund' : 'collect'}">
          <div>
            <div class="dc-ab-label">${amountIsRefund ? 'Give Back to Customer' : 'Collect from Customer'}</div>
            <div class="dc-ab-value">${parseFloat(d.amount).toFixed(3)} KWD</div>
          </div>
          <div class="dc-ab-icon">${amountIsRefund ? '↩' : '💰'}</div>
        </div>` : '';
      const phone = (d.phone || '').replace(/[^0-9+]/g, '');
      const amountLine = hasAmount ? `\n${amountIsRefund ? '↩ Return' : '💰 Collect'}: ${parseFloat(d.amount).toFixed(3)} KWD` : '';
      const waMsg = encodeURIComponent(`${d.order_type} ${d.order_name}\n📍 ${d.address || '—'}\n📞 ${d.phone || '—'}${amountLine}`);

      // Owner override buttons — all statuses available
      const isReturn = d.order_type === 'RETURN';
      const overrideBtns = [
        d.status !== 'pending'   ? `<button class="da-btn da-reset"    onclick="updateDeliveryStatus(${d.id},'pending','${d.shopify_id}','${d.order_type}')">↩ Reset</button>` : '',
        (!isReturn && d.status !== 'picked_up') ? `<button class="da-btn da-pickup"   onclick="updateDeliveryStatus(${d.id},'picked_up','${d.shopify_id}','${d.order_type}')">📦 Picked Up</button>` : '',
        d.status !== 'delivered' ? `<button class="da-btn da-delivered" onclick="updateDeliveryStatus(${d.id},'delivered','${d.shopify_id}','${d.order_type}')">${isReturn ? '✅ Returned' : '✅ Delivered'}</button>` : '',
        d.status !== 'no_answer' ? `<button class="da-btn da-noanswer" onclick="updateDeliveryStatus(${d.id},'no_answer','${d.shopify_id}','${d.order_type}')">📵 No Answer</button>` : '',
      ].filter(Boolean).join('');

      return `
        <div class="delivery-card status-${d.status}" id="dcard-${d.id}">
          <div class="dc-top">
            <div class="dc-row1">
              <div class="dc-left">
                <div class="dc-order-name">${d.order_name}</div>
                <div class="dc-meta">
                  <span class="type-pill ${typeClass}">${d.order_type}</span>
                  <div class="status-dot dot-${d.status}"></div>
                  <span class="status-label sl-${d.status}">${statusLabel}</span>
                </div>
              </div>
            </div>
          </div>
          ${amountBanner}
          <div class="dc-body">
            <div class="dc-customer">${d.customer_name || '—'}</div>
            <div class="dc-info-line"><span class="ic">📍</span>${(d.address || '—').replace(/\n/g, ', ')}</div>
            <div class="dc-info-line"><span class="ic">📞</span>${d.phone || '—'}</div>
            <div class="dc-contact-row">
              ${phone ? `<a href="tel:${phone}" class="dc-contact-btn dc-btn-call" style="text-decoration:none;">📞 Call</a>` : ''}
              ${phone ? `<a href="https://wa.me/${phone.replace('+','')}?text=${waMsg}" target="_blank" class="dc-contact-btn dc-btn-wa" style="text-decoration:none;">💬 WhatsApp</a>` : ''}
            </div>
          </div>
          <div class="dc-divider"></div>
          <div class="dc-actions">
            <div class="dc-actions-label">Override Status</div>
            <div class="dc-override-row">${overrideBtns}</div>
            <button class="da-btn da-unassign" style="width:100%;justify-content:center;" onclick="unassignDelivery(${d.id},'${d.order_name}')">✕ Remove from Driver Queue</button>
          </div>
        </div>`;
    }).join('');
  }

  async function unassignDelivery(id, orderName) {
    if (!confirm('Remove ' + orderName + ' from driver queue?')) return;
    const d = deliveriesData.find(x => x.id === id);
    deliveriesData = deliveriesData.filter(x => x.id !== id);
    updateDeliveryStats();
    renderDeliveries();
    try {
      const res = await fetch('/api/unassign-driver', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ orderName }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      showToast('✓ ' + orderName + ' removed from driver queue', 'success');
      // Refresh warehouse orders so Driver button resets
      loadOrders();
    } catch (err) {
      if (d) deliveriesData.push(d);
      updateDeliveryStats();
      renderDeliveries();
      showToast('Error: ' + err.message, 'error');
    }
  }

  async function updateDeliveryStatus(id, status, shopifyId, orderType) {
    const d = deliveriesData.find(x => x.id === id);
    const prevStatus = d ? d.status : null;
    if (d) d.status = status;
    updateDeliveryStats();
    renderDeliveries();
    try {
      const res = await fetch('/api/deliveries/status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, status, shopifyId, orderType }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      const labels = { picked_up: '📦 Picked Up + Shopify fulfilled!', delivered: '✅ Delivered!', no_answer: '📵 No Answer marked', pending: '↩ Reset to Pending' };
      showToast(labels[status] || status, 'success');
    } catch (err) {
      if (d) d.status = prevStatus;
      updateDeliveryStats();
      renderDeliveries();
      showToast('❌ ' + err.message, 'error');
    }
  }

  // ── Load orders ──────────────────────────────────────────────────────────────
  async function loadOrders() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '↻ Loading...';
    selectedIndexes.clear();
    updateBulkBar();
    document.getElementById('orders-container').innerHTML =
      '<div class="loading-state"><div class="spinner"></div><p>Loading orders...</p></div>';
    try {
      const [ordersRes, historyRes] = await Promise.all([
        fetch('/api/orders'),
        fetch('/api/print-history'),
      ]);
      const data = await ordersRes.json();
      const histData = await historyRes.json();
      if (!data.success) throw new Error(data.error || 'Failed to fetch orders');
      ordersData = data.orders || [];
      printHistory = histData.history || {};
      document.getElementById('order-count').textContent = ordersData.length;
      renderOrders(ordersData);
    } catch (err) {
      document.getElementById('orders-container').innerHTML =
        `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load: ${err.message}</p></div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '↻ Refresh';
    }
  }

  function renderOrders(orders) {
    const container = document.getElementById('orders-container');
    if (!orders || orders.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">✓</div><p>All caught up — no unfulfilled orders.</p></div>';
      return;
    }

    const selectAllRow = `
      <div class="select-all-row" onclick="toggleSelectAll()">
        <input type="checkbox" id="select-all-cb" onclick="event.stopPropagation(); toggleSelectAll()" />
        <span>Select All (${orders.length})</span>
      </div>`;

    const cards = orders.map((order, idx) => {
      const date = new Date(order.createdAt).toLocaleDateString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric'
      });
      const itemsRows = order.items.map(item => `
        <tr>
          <td>${item.title}${item.variant ? ' — ' + item.variant : ''}</td>
          <td>${item.sku || '—'}</td>
          <td class="qty-cell">${item.quantity}</td>
        </tr>`).join('');

      const hist = printHistory[order.name];
      const totalPrints = hist ? (hist.label || 0) + (hist.invoice || 0) + (hist.packing || 0) : 0;
      const printBadge = totalPrints > 0
        ? `<span class="print-badge" title="Label:${hist.label||0} Invoice:${hist.invoice||0} Slip:${hist.packing||0}">Printed ${totalPrints}x</span>`
        : '';

      // Activity strip — build from order.activity array
      const activityStrip = (() => {
        const steps = order.activity || [];
        if (steps.length === 0) return '';
        const pills = steps.map((step, i) => {
          const cls = step.done ? 'done' : 'pending';
          const connector = i < steps.length - 1
            ? `<div class="activity-connector${step.done ? ' done' : ''}"></div>`
            : '';
          return `<div class="activity-step">
            <div class="activity-pill ${cls}">
              <span class="apill-icon">${step.icon}</span>
              <span>${step.label}</span>
            </div>
            ${connector}
          </div>`;
        }).join('');
        return `<div class="activity-strip">${pills}</div>`;
      })();

      const typeClass = order.isReturn ? 'type-return' : order.isExchange ? 'type-exchange' : 'type-unfulfilled';
      const typeLabel = order.isReturn ? 'Return' : order.isExchange ? 'Exchange' : 'Order';

      return `
        <div class="order-card" id="card-${idx}">
          <div class="order-header" onclick="toggleCard(${idx})">
            <div class="order-header-left">
              <input type="checkbox" class="order-check" id="check-${idx}"
                onclick="event.stopPropagation(); toggleSelect(${idx})" />
              <span class="order-number">${order.name}</span>
              <span class="order-type-pill ${typeClass}">${typeLabel}</span>
              ${printBadge}
            </div>
            <div class="order-header-right">
              <span class="order-date">${date}</span>
              <span class="chevron">▼</span>
            </div>
          </div>
          ${activityStrip}
          <div class="order-body">
            <div class="info-grid">
              <div class="info-item">
                <label>Customer</label>
                <span>${order.customerName || '—'}</span>
              </div>
              <div class="info-item">
                <label>Phone</label>
                <span>${order.phone || '—'}</span>
              </div>
              <div class="info-item" style="grid-column:1/-1;">
                <label>Shipping Address</label>
                <span>${order.address || '—'}</span>
              </div>
            </div>
            <table class="items-table">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>SKU</th>
                  <th style="text-align:center;">Qty</th>
                </tr>
              </thead>
              <tbody>${itemsRows}</tbody>
            </table>
            <div class="total-row">Total: ${order.total}</div>
            <div class="action-buttons">
              <button class="btn btn-label"    onclick="printLabel(${idx})"       id="btn-label-${idx}">
                <span class="btn-icon">🏷️</span>Label
              </button>
              <button class="btn btn-invoice"  onclick="printInvoice(${idx})"     id="btn-invoice-${idx}">
                <span class="btn-icon">🖨️</span>Invoice
              </button>
              <button class="btn btn-packing"  onclick="printPackingSlip(${idx})" id="btn-packing-${idx}">
                <span class="btn-icon">📋</span>Slip
              </button>
              <button class="btn btn-printall" onclick="printAll(${idx})"         id="btn-printall-${idx}">
                <span class="btn-icon">⚡</span>Print All
              </button>
              <button class="btn btn-driver ${order.driverStatus ? 'assigned' : ''}" onclick="assignDriver(${idx})" id="btn-driver-${idx}">
                <span class="btn-icon">${order.driverStatus ? '✅' : '🚗'}</span>${order.driverStatus ? 'Assigned' : 'Driver'}
              </button>
              <button class="btn btn-fulfillment ${order.fulfillmentAssigned ? 'assigned' : ''}" onclick="assignFulfillment(${idx})" id="btn-fulfillment-${idx}" style="background:${order.fulfillmentAssigned ? '#7b3fa0' : ''};border-color:${order.fulfillmentAssigned ? '#7b3fa0' : ''};color:${order.fulfillmentAssigned ? '#fff' : ''}">
                <span class="btn-icon">${order.fulfillmentAssigned ? '✅' : '📦'}</span>${order.fulfillmentAssigned ? 'Packing' : 'Pack'}
              </button>
              <button class="btn btn-archive"  onclick="archiveOrder(${idx})"     id="btn-archive-${idx}">
                <span class="btn-icon">📁</span>Archive
              </button>
            </div>
          </div>
        </div>`;
    }).join('');

    container.innerHTML = selectAllRow + cards;
  }

  function toggleCard(idx) {
    document.getElementById(`card-${idx}`).classList.toggle('open');
  }

  function toggleSelect(idx) {
    if (selectedIndexes.has(idx)) {
      selectedIndexes.delete(idx);
      document.getElementById(`card-${idx}`).classList.remove('selected');
    } else {
      selectedIndexes.add(idx);
      document.getElementById(`card-${idx}`).classList.add('selected');
    }
    updateBulkBar();
    updateSelectAllCheckbox();
  }

  function toggleSelectAll() {
    const allSelected = selectedIndexes.size === ordersData.length;
    selectedIndexes.clear();
    ordersData.forEach((_, idx) => {
      const cb = document.getElementById(`check-${idx}`);
      const card = document.getElementById(`card-${idx}`);
      if (!allSelected) {
        selectedIndexes.add(idx);
        if (cb) cb.checked = true;
        if (card) card.classList.add('selected');
      } else {
        if (cb) cb.checked = false;
        if (card) card.classList.remove('selected');
      }
    });
    const saCb = document.getElementById('select-all-cb');
    if (saCb) saCb.checked = !allSelected;
    updateBulkBar();
  }

  function updateSelectAllCheckbox() {
    const saCb = document.getElementById('select-all-cb');
    if (!saCb) return;
    saCb.checked = selectedIndexes.size === ordersData.length && ordersData.length > 0;
    saCb.indeterminate = selectedIndexes.size > 0 && selectedIndexes.size < ordersData.length;
  }

  function updateBulkBar() {
    const bar = document.getElementById('bulk-bar');
    const label = document.getElementById('bulk-label');
    const n = selectedIndexes.size;
    if (n > 0 && currentTab === 'warehouse') {
      bar.classList.add('visible');
      label.textContent = `${n} order${n > 1 ? 's' : ''} selected`;
    } else {
      bar.classList.remove('visible');
    }
  }

  async function printAll(idx) {
    const btn = document.getElementById(`btn-printall-${idx}`);
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-icon">⏳</span>Printing...';
    showToast('Printing all 3 documents...', 'info');
    try {
      await Promise.all([doPrintLabel(idx), doPrintInvoice(idx), doPrintPackingSlip(idx)]);
      showToast('All 3 printed for ' + ordersData[idx].name + '!', 'success');
    } catch (err) {
      showToast('❌ ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = orig;
    }
  }

  async function bulkPrint(type) {
    const indexes = [...selectedIndexes].sort((a, b) => a - b);
    if (indexes.length === 0) return;
    const btns = ['bulk-btn-label','bulk-btn-invoice','bulk-btn-packing','bulk-btn-all'];
    btns.forEach(id => { const b = document.getElementById(id); if(b) b.disabled = true; });
    showToast(`Printing for ${indexes.length} orders...`, 'info');
    let done = 0;
    for (const idx of indexes) {
      try {
        if (type === 'label')   await doPrintLabel(idx);
        if (type === 'invoice') await doPrintInvoice(idx);
        if (type === 'packing') await doPrintPackingSlip(idx);
        if (type === 'all') {
          try { await doPrintLabel(idx); } catch(e) { showToast(`${ordersData[idx].name}: ${e.message}`, 'error'); await sleep(1000); }
          try { await doPrintInvoice(idx); } catch(e) { showToast(`${ordersData[idx].name}: ${e.message}`, 'error'); await sleep(1000); }
          try { await doPrintPackingSlip(idx); } catch(e) { showToast(`${ordersData[idx].name}: ${e.message}`, 'error'); await sleep(1000); }
        }
        done++;
        showToast(`${done}/${indexes.length} done...`, 'info');
      } catch (err) {
        showToast(`${ordersData[idx].name}: ${err.message}`, 'error');
        await sleep(1500);
      }
    }
    btns.forEach(id => { const b = document.getElementById(id); if(b) b.disabled = false; });
    showToast(`Done! ${done}/${indexes.length} orders printed.`, 'success');
  }

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function doPrintLabel(idx) {
    const order = ordersData[idx];
    const res = await fetch('/api/print/label', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        orderName: order.name, shopifyId: order.shopifyId,
        customerName: order.customerName, address: order.address,
        addressLine1: order.addressLine1, addressLine2: order.addressLine2,
        addressCity: order.addressCity, phone: order.phone,
        isExchange: order.isExchange, total: order.total,
      }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
  }

  async function doPrintInvoice(idx) {
    const order = ordersData[idx];
    const res = await fetch('/api/print/invoice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderName: order.name }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
  }

  async function doPrintPackingSlip(idx) {
    const order = ordersData[idx];
    const res = await fetch('/api/print/packing-slip', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        shopifyId: order.shopifyId, orderName: order.name,
        customerName: order.customerName, address: order.address,
        phone: order.phone, items: order.items, total: order.total,
      }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
  }

  async function printLabel(idx) {
    await doAction(document.getElementById(`btn-label-${idx}`), async () => {
      await doPrintLabel(idx);
      showToast('Label sent to Zebra!', 'success');
    });
  }

  async function printInvoice(idx) {
    await doAction(document.getElementById(`btn-invoice-${idx}`), async () => {
      await doPrintInvoice(idx);
      showToast('Invoice sent to HP!', 'success');
    });
  }

  async function printPackingSlip(idx) {
    await doAction(document.getElementById(`btn-packing-${idx}`), async () => {
      await doPrintPackingSlip(idx);
      showToast('Packing slip sent to HP!', 'success');
    });
  }

  async function assignDriver(idx) {
    const order = ordersData[idx];
    const btn = document.getElementById(`btn-driver-${idx}`);
    const isAssigned = btn.classList.contains('assigned');

    if (isAssigned) {
      // UNASSIGN
      if (!confirm(`Remove ${order.name} from the driver queue?`)) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-icon">⏳</span>Removing...';
      try {
        const res = await fetch('/api/unassign-driver', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderName: order.name }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        showToast(`${order.name} removed from driver queue.`, 'info');
        btn.classList.remove('assigned');
        btn.innerHTML = '<span class="btn-icon">🚗</span>Driver';
        btn.disabled = false;
      } catch (err) {
        showToast('❌ ' + err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<span class="btn-icon">✅</span>Assigned';
      }
    } else {
      // ASSIGN
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-icon">⏳</span>Sending...';
      try {
        const res = await fetch('/api/assign-driver', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            orderName: order.name,
            shopifyId: order.shopifyId,
            customerName: order.customerName,
            address: order.address,
            phone: order.phone,
            total: order.total,
            amountToCollect: order.amountToCollect,
            refundAmount: order.refundAmount,
            isExchange: order.isExchange,
            isReturn: order.isReturn,
            orderType: order.isReturn ? 'RETURN' : order.isExchange ? 'EXCHANGE' : 'ORDER',
          }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        if (data.alreadyAssigned) {
          showToast(`${order.name} is already in the driver queue.`, 'info');
        } else {
          showToast(`${order.name} sent to driver! 🚗`, 'success');
        }
        btn.classList.add('assigned');
        btn.innerHTML = '<span class="btn-icon">✅</span>Assigned';
        btn.disabled = false;
      } catch (err) {
        showToast('❌ ' + err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<span class="btn-icon">🚗</span>Driver';
      }
    }
  }

  async function bulkAssignDriver() {
    const indexes = [...selectedIndexes].sort((a, b) => a - b);
    if (indexes.length === 0) return;
    const btn = document.getElementById('bulk-btn-driver');
    btn.disabled = true;
    btn.textContent = '⏳ Assigning...';
    let done = 0, skipped = 0;
    for (const idx of indexes) {
      const order = ordersData[idx];
      try {
        const res = await fetch('/api/assign-driver', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            orderName: order.name,
            shopifyId: order.shopifyId,
            customerName: order.customerName,
            address: order.address,
            phone: order.phone,
            total: order.total,
            amountToCollect: order.amountToCollect,
            refundAmount: order.refundAmount,
            isExchange: order.isExchange,
            isReturn: order.isReturn,
            orderType: order.isReturn ? 'RETURN' : order.isExchange ? 'EXCHANGE' : 'ORDER',
          }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        if (data.alreadyAssigned) {
          skipped++;
        } else {
          done++;
          // Update the individual driver button state
          const driverBtn = document.getElementById(`btn-driver-${idx}`);
          if (driverBtn) {
            driverBtn.classList.add('assigned');
            driverBtn.innerHTML = '<span class="btn-icon">✅</span>Assigned';
          }
        }
      } catch (err) {
        showToast(`❌ ${order.name}: ${err.message}`, 'error');
        await sleep(1000);
      }
    }
    btn.disabled = false;
    btn.textContent = '🚗 Assign';
    const parts = [];
    if (done > 0) parts.push(`${done} assigned`);
    if (skipped > 0) parts.push(`${skipped} already assigned`);
    showToast('✅ ' + parts.join(', '), 'success');
  }

  async function bulkUnassignDriver() {
    const indexes = [...selectedIndexes].sort((a, b) => a - b);
    if (indexes.length === 0) return;
    const names = indexes.map(i => ordersData[i].name).join(', ');
    if (!confirm(`Remove ${indexes.length} order(s) from driver queue?\n${names}`)) return;
    const btn = document.getElementById('bulk-btn-unassign');
    btn.disabled = true;
    btn.textContent = '⏳ Removing...';
    let done = 0;
    for (const idx of indexes) {
      const order = ordersData[idx];
      try {
        const res = await fetch('/api/unassign-driver', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderName: order.name }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        done++;
        // Update the individual driver button state
        const driverBtn = document.getElementById(`btn-driver-${idx}`);
        if (driverBtn) {
          driverBtn.classList.remove('assigned');
          driverBtn.innerHTML = '<span class="btn-icon">🚗</span>Driver';
        }
      } catch (err) {
        showToast(`❌ ${order.name}: ${err.message}`, 'error');
        await sleep(1000);
      }
    }
    btn.disabled = false;
    btn.textContent = '✕ Unassign';
    showToast(`✓ ${done} order(s) removed from driver queue.`, 'info');
  }

  async function assignFulfillment(idx) {
    const order = ordersData[idx];
    const btn = document.getElementById(`btn-fulfillment-${idx}`);
    const isAssigned = btn.classList.contains('assigned');

    if (isAssigned) {
      // UNASSIGN
      if (!confirm(`Remove ${order.name} from the packing queue?`)) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-icon">⏳</span>Removing...';
      try {
        const res = await fetch('/api/unassign-fulfillment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderName: order.name }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        showToast(`${order.name} removed from packing queue.`, 'info');
        btn.classList.remove('assigned');
        btn.style.background = '';
        btn.style.borderColor = '';
        btn.style.color = '';
        btn.innerHTML = '<span class="btn-icon">📦</span>Pack';
        btn.disabled = false;
        order.fulfillmentAssigned = false;
      } catch (err) {
        showToast('❌ ' + err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<span class="btn-icon">✅</span>Packing';
      }
    } else {
      // ASSIGN
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-icon">⏳</span>Sending...';
      try {
        const res = await fetch('/api/assign-fulfillment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            orderName: order.name,
            shopifyId: order.shopifyId,
            orderType: order.isExchange ? 'EXCHANGE' : 'ORDER',
          }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        if (data.alreadyAssigned) {
          showToast(`${order.name} is already in the packing queue.`, 'info');
        } else {
          showToast(`${order.name} sent to packing! 📦`, 'success');
        }
        btn.classList.add('assigned');
        btn.style.background = '#7b3fa0';
        btn.style.borderColor = '#7b3fa0';
        btn.style.color = '#fff';
        btn.innerHTML = '<span class="btn-icon">✅</span>Packing';
        btn.disabled = false;
        order.fulfillmentAssigned = true;
      } catch (err) {
        showToast('❌ ' + err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '<span class="btn-icon">📦</span>Pack';
      }
    }
  }

  async function bulkAssignFulfillment() {
    const indexes = [...selectedIndexes].sort((a, b) => a - b);
    if (indexes.length === 0) return;
    const btn = document.getElementById('bulk-btn-fulfillment');
    btn.disabled = true;
    btn.textContent = '⏳ Sending...';
    let done = 0, skipped = 0;
    for (const idx of indexes) {
      const order = ordersData[idx];
      if (order.isReturn) { skipped++; continue; } // returns don't need packing
      try {
        const res = await fetch('/api/assign-fulfillment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            orderName: order.name,
            shopifyId: order.shopifyId,
            orderType: order.isExchange ? 'EXCHANGE' : 'ORDER',
          }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        if (data.alreadyAssigned) {
          skipped++;
        } else {
          done++;
          const packBtn = document.getElementById(`btn-fulfillment-${idx}`);
          if (packBtn) {
            packBtn.classList.add('assigned');
            packBtn.style.background = '#7b3fa0';
            packBtn.style.borderColor = '#7b3fa0';
            packBtn.style.color = '#fff';
            packBtn.innerHTML = '<span class="btn-icon">✅</span>Packing';
          }
          order.fulfillmentAssigned = true;
        }
      } catch (err) {
        showToast(`❌ ${order.name}: ${err.message}`, 'error');
        await sleep(1000);
      }
    }
    btn.disabled = false;
    btn.textContent = '📦 Pack';
    const parts = [];
    if (done > 0) parts.push(`${done} sent to packing`);
    if (skipped > 0) parts.push(`${skipped} skipped`);
    showToast('✅ ' + parts.join(', '), 'success');
  }

  async function bulkUnassignFulfillment() {
    const indexes = [...selectedIndexes].sort((a, b) => a - b);
    if (indexes.length === 0) return;
    const names = indexes.map(i => ordersData[i].name).join(', ');
    if (!confirm(`Remove ${indexes.length} order(s) from packing queue?\n${names}`)) return;
    const btn = document.getElementById('bulk-btn-unpack');
    btn.disabled = true;
    btn.textContent = '⏳ Removing...';
    let done = 0;
    for (const idx of indexes) {
      const order = ordersData[idx];
      try {
        const res = await fetch('/api/unassign-fulfillment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderName: order.name }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        done++;
        const packBtn = document.getElementById(`btn-fulfillment-${idx}`);
        if (packBtn) {
          packBtn.classList.remove('assigned');
          packBtn.style.background = '';
          packBtn.style.borderColor = '';
          packBtn.style.color = '';
          packBtn.innerHTML = '<span class="btn-icon">📦</span>Pack';
        }
        order.fulfillmentAssigned = false;
      } catch (err) {
        showToast(`❌ ${order.name}: ${err.message}`, 'error');
        await sleep(1000);
      }
    }
    btn.disabled = false;
    btn.textContent = '✕ Unpack';
    showToast(`✓ ${done} order(s) removed from packing queue.`, 'info');
  }

  async function archiveOrder(idx) {
    const order = ordersData[idx];
    if (!confirm(`Archive order ${order.name}?`)) return;
    await doAction(document.getElementById(`btn-archive-${idx}`), async () => {
      const res = await fetch('/api/orders/archive', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ shopifyId: order.shopifyId }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      showToast(`${order.name} archived!`, 'success');
      selectedIndexes.delete(idx);
      updateBulkBar();
      const card = document.getElementById(`card-${idx}`);
      card.style.opacity = '0';
      card.style.transition = 'opacity 0.4s';
      setTimeout(() => {
        ordersData.splice(idx, 1);
        document.getElementById('order-count').textContent = ordersData.length;
        renderOrders(ordersData);
      }, 400);
    });
  }

  async function doAction(btn, fn) {
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-icon">⏳</span>Sending...';
    try { await fn(); }
    catch (err) { showToast('❌ ' + err.message, 'error'); }
    finally { btn.disabled = false; btn.innerHTML = orig; }
  }

  function showToast(msg, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show ' + type;
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.className = 'toast'; }, 3500);
  }

  // ── Printer / Relay status indicator ──
  async function loadRelayStatus() {
    try {
      const res = await fetch('/api/relay-status');
      const data = await res.json();
      const dot   = document.getElementById('printer-dot');
      const label = document.getElementById('printer-label');
      if (data.online === true) {
        dot.style.background   = '#22c55e'; // green
        label.style.color      = '#22c55e';
        label.textContent      = 'PRINTERS ONLINE';
      } else if (data.online === false) {
        dot.style.background   = '#ef4444'; // red
        label.style.color      = '#ef4444';
        label.textContent      = 'PRINTERS OFFLINE';
      } else {
        dot.style.background   = '#555';
        label.style.color      = '#aaa';
        label.textContent      = 'PRINTERS';
      }
    } catch (e) { /* silent */ }
  }

  // Init
  loadOrders();
  loadRelayStatus();
  setInterval(() => { if (currentTab === 'warehouse') loadOrders(); }, 60000);
  setInterval(loadRelayStatus, 2 * 60 * 1000); // refresh printer status every 2 min
</script>
